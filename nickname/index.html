<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PastelizeNick Tester</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --panel: #141418;
    --border: #2a2a35;
    --accent: #7c6aff;
    --text: #e8e8f0;
    --muted: #5a5a72;
    --mono: 'Space Mono', monospace;
    --sans: 'Noto Sans KR', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px 80px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,106,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,106,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 680px;
  }

  header { margin-bottom: 48px; text-align: left; }

  .tag {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 12px;
    display: block;
  }

  h1 {
    font-family: var(--mono);
    font-size: clamp(22px, 5vw, 36px);
    font-weight: 700;
    color: var(--text);
    line-height: 1.1;
    margin-bottom: 10px;
  }

  .subtitle {
    font-size: 14px;
    color: var(--muted);
    font-weight: 300;
    line-height: 1.6;
  }

  .input-section {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    margin-bottom: 28px;
    transition: border-color 0.2s;
  }

  .input-section:focus-within { border-color: var(--accent); }

  .input-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    display: block;
    margin-bottom: 14px;
  }

  #nick-input {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    font-family: var(--mono);
    font-size: 26px;
    color: var(--text);
    caret-color: var(--accent);
    letter-spacing: 1px;
  }

  #nick-input::placeholder { color: #2e2e3e; }

  .result-section {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    margin-bottom: 20px;
  }

  .preview-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 28px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  .color-swatch {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.08);
    transition: background 0.15s ease;
    flex-shrink: 0;
  }

  .preview-nick {
    font-family: var(--mono);
    font-size: clamp(18px, 4vw, 28px);
    font-weight: 700;
    transition: color 0.15s ease;
    word-break: break-all;
  }

  .data-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .data-cell {
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
  }

  .data-cell.full { grid-column: 1 / -1; }

  .data-key {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 6px;
  }

  .data-value {
    font-family: var(--mono);
    font-size: 15px;
    color: var(--text);
    word-break: break-all;
  }

  .hsv-bars { display: flex; flex-direction: column; gap: 8px; }

  .hsv-row { display: flex; align-items: center; gap: 10px; }

  .hsv-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    width: 14px;
  }

  .hsv-track {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }

  .hsv-fill {
    height: 100%;
    border-radius: 99px;
    background: var(--accent);
    transition: width 0.15s ease;
  }

  .hsv-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    width: 38px;
    text-align: right;
  }

  .bytes-wrap { display: flex; flex-wrap: wrap; gap: 6px; }

  .byte-chip {
    background: rgba(124,106,255,0.1);
    border: 1px solid rgba(124,106,255,0.2);
    border-radius: 5px;
    padding: 3px 8px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
  }

  .empty-hint {
    text-align: center;
    padding: 40px 0;
    color: var(--muted);
    font-size: 13px;
    font-family: var(--mono);
  }

  .empty-hint .arrow {
    font-size: 22px;
    display: block;
    margin-bottom: 8px;
    opacity: 0.4;
  }

  .presets-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .presets { display: flex; flex-wrap: wrap; gap: 8px; }

  .preset-btn {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 5px 14px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .preset-btn:hover {
    background: rgba(124,106,255,0.1);
    border-color: rgba(124,106,255,0.4);
    color: var(--text);
  }

  @keyframes pulse {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.12); }
    100% { transform: scale(1); }
  }

  .pulse { animation: pulse 0.2s ease; }
</style>
</head>
<body>

<div class="container">
  <header>
    <span class="tag">GMod EasyChat</span>
    <h1>PastelizeNick<br>Tester</h1>
    <p class="subtitle">닉네임 문자열 → 해시 → HSV 컬러 변환 실시간 시뮬레이터<br>UTF-8 한글 / 이모지 / 특수문자 모두 지원<br>가끔은 틀린 결과가 나옵니다. 참고용으로만 써주세요.</p>
  </header>

  <div class="input-section">
    <label class="input-label" for="nick-input">닉네임 입력</label>
    <input
      type="text"
      id="nick-input"
      placeholder="닉네임을 입력하세요..."
      autocomplete="off"
      spellcheck="false"
    >
  </div>

  <div class="result-section" id="result-section">
    <div class="empty-hint" id="empty-hint">
      <span class="arrow">↑</span>
      닉네임을 입력하면 결과가 여기 표시됩니다
    </div>
    <div id="result-content" style="display:none">
      <div class="preview-row">
        <div class="color-swatch" id="swatch"></div>
        <div class="preview-nick" id="preview-nick"></div>
      </div>

      <div class="data-grid">
        <div class="data-cell">
          <div class="data-key">Hash Value</div>
          <div class="data-value" id="out-hash">—</div>
        </div>
        <div class="data-cell">
          <div class="data-key">Hex Color</div>
          <div class="data-value" id="out-hex">—</div>
        </div>

        <div class="data-cell">
          <div class="data-key">Hue (°)</div>
          <div class="data-value" id="out-hue">—</div>
        </div>
        <div class="data-cell">
          <div class="data-key">RGB</div>
          <div class="data-value" id="out-rgb">—</div>
        </div>

        <div class="data-cell full">
          <div class="data-key">HSV Breakdown</div>
          <div class="hsv-bars">
            <div class="hsv-row">
              <span class="hsv-label">H</span>
              <div class="hsv-track"><div class="hsv-fill" id="bar-h"></div></div>
              <span class="hsv-num" id="num-h"></span>
            </div>
            <div class="hsv-row">
              <span class="hsv-label">S</span>
              <div class="hsv-track"><div class="hsv-fill" id="bar-s"></div></div>
              <span class="hsv-num" id="num-s"></span>
            </div>
            <div class="hsv-row">
              <span class="hsv-label">V</span>
              <div class="hsv-track"><div class="hsv-fill" id="bar-v"></div></div>
              <span class="hsv-num" id="num-v"></span>
            </div>
          </div>
        </div>

        <div class="data-cell full">
          <div class="data-key">UTF-8 Bytes</div>
          <div class="bytes-wrap" id="out-bytes"></div>
        </div>

        <div class="data-cell full">
          <div class="data-key">Branch Conditions</div>
          <div class="data-value" id="out-sat-branch">—</div>
        </div>
      </div>
    </div>
  </div>

  <div style="margin-top: 4px;">
    <div class="presets-label">빠른 테스트</div>
    <div class="presets" id="presets"></div>
  </div>
</div>

<script>
// ── Lua 알고리즘 JS 포팅 ─────────────────────────────────────

function textToBytes(text) {
  return Array.from(new TextEncoder().encode(text));
}

function stringHash(text) {
  const bytes = textToBytes(text);
  const len = bytes.length;

  let counter = BigInt(1);
  const MOD_LOOP  = BigInt(4294967279); // 2^32 - 17
  const MOD_FINAL = BigInt(4294967291); // 2^32 - 5

  for (let i = 0; i < len; i += 3) {
    const b0 = BigInt(bytes[i]);
    const b1 = BigInt(bytes[i + 1] !== undefined ? bytes[i + 1] : (len - i + 256));
    const b2 = BigInt(bytes[i + 2] !== undefined ? bytes[i + 2] : (len - i + 256));

    counter =
      (counter * BigInt(8161)) % MOD_LOOP +
      b0 * BigInt(16776193) +
      b1 * BigInt(8372226)  +
      b2 * BigInt(3932164);
  }

  return Number(counter % MOD_FINAL);
}

function hsvToRgb(h, s, v) {
  h = ((h % 360) + 360) % 360;
  const c = v * s;
  const x = c * (1 - Math.abs((h / 60) % 2 - 1));
  const m = v - c;
  let r = 0, g = 0, b = 0;
  if      (h < 60)  { r=c; g=x; b=0; }
  else if (h < 120) { r=x; g=c; b=0; }
  else if (h < 180) { r=0; g=c; b=x; }
  else if (h < 240) { r=0; g=x; b=c; }
  else if (h < 300) { r=x; g=0; b=c; }
  else              { r=c; g=0; b=x; }
  return {
    r: Math.round((r + m) * 255),
    g: Math.round((g + m) * 255),
    b: Math.round((b + m) * 255)
  };
}

function pastelizeNick(nick) {
  const hash       = stringHash(nick);
  const saturation = hash % 3 === 0;   // true → S = 0.3 (파스텔), false → S = 0.6
  const value      = hash % 127 === 0; // true → V = 0.6 (어둠), false → V = 1.0
  const hue        = (hash % 180) * 2;
  const s          = saturation ? 0.3 : 0.6;
  const v          = value      ? 0.6 : 1.0;
  const rgb        = hsvToRgb(hue, s, v);
  return { hash, hue, s, v, rgb, saturation, value };
}

// ── DOM 참조 ───────────────────────────────────────────────────

const input         = document.getElementById('nick-input');
const emptyHint     = document.getElementById('empty-hint');
const resultContent = document.getElementById('result-content');
const swatch        = document.getElementById('swatch');
const previewNick   = document.getElementById('preview-nick');
const outHash       = document.getElementById('out-hash');
const outHex        = document.getElementById('out-hex');
const outHue        = document.getElementById('out-hue');
const outRgb        = document.getElementById('out-rgb');
const outBytes      = document.getElementById('out-bytes');
const outSatBranch  = document.getElementById('out-sat-branch');
const barH = document.getElementById('bar-h');
const barS = document.getElementById('bar-s');
const barV = document.getElementById('bar-v');
const numH = document.getElementById('num-h');
const numS = document.getElementById('num-s');
const numV = document.getElementById('num-v');

function toHex(n) { return n.toString(16).padStart(2, '0').toUpperCase(); }

function update() {
  const nick = input.value;

  if (!nick) {
    emptyHint.style.display = 'block';
    resultContent.style.display = 'none';
    return;
  }

  emptyHint.style.display = 'none';
  resultContent.style.display = 'block';

  const { hash, hue, s, v, rgb, saturation, value } = pastelizeNick(nick);
  const hexColor = `#${toHex(rgb.r)}${toHex(rgb.g)}${toHex(rgb.b)}`;

  swatch.classList.remove('pulse');
  void swatch.offsetWidth;
  swatch.classList.add('pulse');

  swatch.style.background = hexColor;
  previewNick.style.color = hexColor;
  previewNick.textContent = nick;

  outHash.textContent = hash.toLocaleString() + '  (0x' + hash.toString(16).toUpperCase() + ')';
  outHex.textContent  = hexColor;
  outHue.textContent  = hue + '°';
  outRgb.textContent  = `${rgb.r}, ${rgb.g}, ${rgb.b}`;

  barH.style.width      = (hue / 360 * 100).toFixed(1) + '%';
  barH.style.background = `hsl(${hue}, 80%, 55%)`;
  barS.style.width      = (s * 100).toFixed(0) + '%';
  barV.style.width      = (v * 100).toFixed(0) + '%';
  numH.textContent = hue + '°';
  numS.textContent = (s * 100).toFixed(0) + '%';
  numV.textContent = (v * 100).toFixed(0) + '%';

  const bytes = textToBytes(nick);
  outBytes.innerHTML = bytes.map(b =>
    `<span class="byte-chip">0x${b.toString(16).toUpperCase().padStart(2,'0')}</span>`
  ).join('');

  outSatBranch.textContent =
    `hash % 3 = ${hash % 3}  →  S = ${s}  ${saturation ? '✦ 파스텔 모드' : ''}` +
    `  |  hash % 127 = ${hash % 127}  →  V = ${v}  ${value ? '✦ 어두운 모드' : ''}`;
}

input.addEventListener('input', update);

// ── 프리셋 버튼 ───────────────────────────────────────────────

const presetNicks = [
  'Player', 'Admin', 'xX_NoScope_Xx',
  '홍길동', '김철수', '이영희',
  '한글유저', '😎 Cool', '日本語テスト',
  '☆彡', 'αβγδ', 'Łukasz'
];

const presetsEl = document.getElementById('presets');
presetNicks.forEach(nick => {
  const btn = document.createElement('button');
  btn.className = 'preset-btn';
  btn.textContent = nick;
  btn.addEventListener('click', () => {
    input.value = nick;
    update();
    input.focus();
  });
  presetsEl.appendChild(btn);
});
</script>
</body>
</html>
